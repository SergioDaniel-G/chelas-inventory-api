<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recurso no encontrado | Micheladas Chelas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #1e293b;
            --brand-accent: #3b82f6;
            --text-main: #334155;
            --text-muted: #64748b;
            --bg-body: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-main);
        }

        .error-wrapper {
            background: white;
            padding: 4rem 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            max-width: 550px;
            width: 90%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .error-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--brand-primary), var(--brand-accent));
        }

        .icon-container {
            color: #cbd5e1;
            margin-bottom: 1.5rem;
        }

        .status-code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            margin: 0;
            background: linear-gradient(180deg, var(--brand-primary), #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--brand-primary);
            margin: 1rem 0;
        }

        p {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            padding: 0 10%;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .btn-primary {
            background-color: var(--brand-primary);
            color: white;
            border: 1px solid var(--brand-primary);
        }

        .btn-primary:hover {
            background-color: #0f172a;
            transform: translateY(-1px);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
        }

        .btn-outline:hover {
            background-color: #f8fafc;
            border-color: #cbd5e1;
        }

        .support-link {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .support-link a {
            color: var(--brand-accent);
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="error-wrapper">
    <div class="icon-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
    </div>

    <h1 class="status-code">404</h1>
    <h2>Recurso no localizado</h2>
    <p>La dirección solicitada no existe o ha sido movida permanentemente de nuestro servidor.</p>

    <div class="actions">
        <a th:href="@{/index}" class="btn btn-primary">Regresar al Sistema</a>
        <a href="javascript:history.back()" class="btn btn-outline">Página anterior</a>
    </div>

    <div class="support-link">
        ¿Problemas técnicos?
        <a href="mailto:danilinhoserg@hotmail.com">Contactar soporte especializado</a>
    </div>
</div>

</body>
</html>
