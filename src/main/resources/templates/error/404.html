<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Página no encontrada | Micheladas Chelas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .error-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { text-align: center; max-width: 500px; padding: 40px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .status-code { font-size: 80px; font-weight: bold; color: #e67e22; margin-bottom: 0; }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-card">
        <p class="status-code">404</p>
        <h2 class="mb-3">Contenido no disponible</h2>
        <p class="text-muted mb-4">
            La sección o el producto que intenta consultar no se encuentra disponible en este momento o la dirección es incorrecta.
        </p>
        <div class="d-grid gap-2">
            <a th:href="@{/}" class="btn btn-primary">Volver al Tablero Principal</a>
            <a href="mailto:soporte@chelas.com" class="btn btn-outline-secondary btn-sm">Contactar a Soporte</a>
        </div>
    </div>
</div>
</body>
</html>
