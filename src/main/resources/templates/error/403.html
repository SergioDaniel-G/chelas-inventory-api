<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acceso Restringido | Sistema Micheladas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --bg-gray: #f9fafb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-dark);
        }

        .error-card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            text-align: center;
            border-top: 5px solid #ef4444;
        }

        .icon-box {
            background-color: #fee2e2;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .icon-box svg {
            color: #ef4444;
            width: 40px;
            height: 40px;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        p {
            color: var(--text-light);
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .btn-home {
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s;
            display: inline-block;
        }

        .btn-home:hover {
            background-color: #1d4ed8;
        }

        .footer-text {
            font-size: 0.875rem;
            margin-top: 2rem;
            border-top: 1px solid #e5e7eb;
            padding-top: 1rem;
        }
    </style>
</head>
<body>

<div class="error-card">
    <div class="icon-box">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
    </div>

    <h1>Acceso Denegado</h1>
    <p>Su cuenta actual no tiene privilegios suficientes para acceder a este recurso. Por favor, vuelva al panel principal o contacte a soporte técnico.</p>

    <a th:href="@{/caguamas}" class="btn-home">Ir al Panel de Control</a>

    <div class="footer-text">
        ID de Error: <strong>403 - Forbidden</strong> <br>
        <span th:text="${#dates.format(#dates.createNow(), 'dd/MMM/yyyy HH:mm')}"></span>
    </div>
</div>

</body>
</html>
