<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:replace="~{layout/editar :: head('Editar Cigarros')}"></th:block>
</head>
<body>

<header th:replace="~{layout/editar :: header('GESTIÓN DE CLIENTES')}"></header>

<div class="cuerpo-pagina">
	<div class="tarjeta-edicion">
		<h1 class="titulo-formulario">Edición de Cigarros</h1>

		<form th:action="@{/cigarros/{id}(id=${cigarro.id})}" th:object="${cigarro}" method="POST">
			<div th:replace="~{layout/new :: alertas_flash}"></div>

			<input type="hidden" th:field="*{id}">

			<div class="campo-grupo">
				<label>Marca:</label>
				<input type="text" th:field="*{marca}" required>
			</div>

			<div class="campo-grupo">
				<label>Precio:</label>
				<input type="text" th:field="*{precio}" required>
			</div>

			<div class="campo-grupo">
				<label>Cantidad:</label>
				<input type="text" th:field="*{cantidad}" required>
			</div>

			<div class="campo-grupo">
				<label>Total:</label>
				<input type="text" th:field="*{total}" readonly>
			</div>

			<button type="submit" class="boton-guardar">Actualizar Registro</button>
		</form>
	</div>
</div>

<footer th:replace="~{layout/editar :: footer}"></footer>

</body>
</html>
