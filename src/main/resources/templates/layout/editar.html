<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(titulo)">
	<meta charset="utf-8">
	<title th:text="${titulo}"></title>
	<link rel="stylesheet" th:href="@{/css/estili.css}">
</head>

<body>

<header th:fragment="header(seccionActual)" class="header-estatico">
	<div class="nav-container">
		<img th:src="@{/img/micheladasChelas.jpg}" alt="Logo" style="width: 80px; height: auto; vertical-align: middle;">
		<nav class="menu-navegacion">
			<a th:href="${backUrl}"
			   onclick="if(window.history.length > 1) { window.history.back(); return false; }">
				Volver a la página anterior
			</a>
			<a th:href="@{/index}">Menú</a>
		</nav>
	</div>
</header>

<footer th:fragment="footer" class="footer-estatico">
	<p>&copy; 2026 - Gestión de Inventario Fijo</p>
	<p>&copy; Derechos reservados Micheladas Chelas</p>
</footer>

</body>
</html>
