<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  th:replace="~{layout/view :: layout(~{::section})}">
<body>

<section>
	<nav>
		<a th:href="@{/prestados}" class="btn-back">Página anterior</a>
	</nav>
	<h2>Datos registrados</h2>
	<table>
		<tr>
			<th>ID:</th>
			<td th:text="${prestado.id}"></td>
		</tr>
		<tr>
			<th>Nombre:</th>
			<td th:text="${prestado.nombre}"></td>
		</tr>
		<tr>
			<th>Cantidad:</th>
			<td th:text="${prestado.cantidad}"></td>
		</tr>
		<tr>
			<th>Descripción:</th>
			<td th:text="${prestado.descripcionDelPedido}"></td>
		</tr>
		<tr>
			<th>Total:</th>
			<td th:text="${prestado.total}"></td>
		</tr>
		<tr>
			<th>Fecha de Registro:</th>
			<td th:text="${prestado.fechaRegistro}"></td>
		</tr>
	</table>
</section>

</body>
</html>
