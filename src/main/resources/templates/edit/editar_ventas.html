<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:replace="~{layout/editar :: head('Editar VENTAS')}"></th:block>
</head>
<body>

<header th:replace="~{layout/editar :: header('GESTIÓN DE VENTAS')}"></header>

<div class="cuerpo-pagina">
	<div class="tarjeta-edicion">
		<h1 class="titulo-formulario">Edición de Ventas</h1>

		<form th:action="@{/ventas/{id}(id=${venta.id})}" th:object="${venta}" method="POST">
			<div th:replace="~{layout/new :: alertas_flash}"></div>

			<input type="hidden" th:field="*{id}">

			<div class="campo-grupo">
				<label>Id:</label>
				<span class="texto-id" th:text="*{id}"></span>
			</div>

			<div class="campo-grupo">
				<label>Vasos:</label>
				<input type="text" th:field="*{cupsQuantity}" required>
			</div>

			<div class="campo-grupo">
				<label>Cigarros:</label>
				<input type="text" th:field="*{cigarettesQuantity}" required>
			</div>

			<div class="campo-grupo">
				<label>Caguamas:</label>
				<input type="text" th:field="*{caguamasQuantity}" required>
			</div>

			<div class="campo-grupo">
				<label>Total:</label>
				<input type="text" th:field="*{totalAmount}" required>
			</div>

			<div class="campo-grupo">
				<label>Stock caguamas:</label>
				<input type="text" th:field="*{caguamasStock}" required>
			</div>

			<div class="campo-grupo">
				<label>Stock cigarros:</label>
				<input type="text" th:field="*{cigarettesStock}" required>
			</div>

			<button type="submit" class="boton-guardar">Actualizar Registro</button>
		</form>
	</div>
</div>

<footer th:replace="~{layout/editar :: footer}"></footer>

</body>
</html>
