<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<th:block th:replace="~{layout/editar :: head('Editar Prestados')}"></th:block>
</head>
<body>

<header th:replace="~{layout/editar :: header('GESTIÓN DE PRESTADOS')}"></header>

<div class="cuerpo-pagina">
	<div class="tarjeta-edicion">
		<h1 class="titulo-formulario">Edición de Prestados</h1>

		<form th:action="@{/prestados/{id}(id=${prestado.id})}" th:object="${prestado}" method="POST">
			<div th:replace="~{layout/new :: alertas_flash}"></div>

			<input type="hidden" th:field="*{id}">

			<div class="campo-grupo">
				<label>Id:</label>
				<span class="texto-id" th:text="*{id}"></span>
			</div>

			<div class="campo-grupo">
				<label>Nombre:</label>
				<input type="text" th:field="*{customerName}" required>
			</div>

			<div class="campo-grupo">
				<label>Cantidad:</label>
				<input type="text" th:field="*{quantity}" required>
			</div>

			<div class="campo-grupo">
				<label>Total:</label>
				<input type="text" th:field="*{totalAmount}" required>
			</div>

			<div class="campo-grupo">
				<label>Descripcion:</label>
				<input type="text" th:field="*{orderDescription}" required>
			</div>

			<div class="campo-grupo">
				<label>Telefono:</label>
				<input type="text" th:field="*{customerPhone}" required>
			</div>

			<button type="submit" class="boton-guardar">Actualizar Registro</button>
		</form>
	</div>
</div>

<footer th:replace="~{layout/editar :: footer}"></footer>

</body>
</html>
