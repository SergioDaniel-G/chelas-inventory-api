<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/new :: head_comun('Precios')}"></head>
<body>

<header th:replace="~{layout/new :: navbar('PRECIOS', '/precios', 'Listado de precios')}"></header>

<main>
	<div th:replace="~{layout/new :: alerta_success}"></div>

	<h1>Gestión de Precios</h1>

	<form th:action="@{/precios/guardar}" th:object="${precio}" method="POST">
		<table>
			<tr>
				<td><label for="id_producto">Id producto:</label></td>
				<td>
					<input type="text" th:field="*{id_producto}" id="id_producto">
					<span th:if="${#fields.hasErrors('id_producto')}" th:errors="*{id_producto}" style="color: red;"></span>
				</td>
			</tr>

			<tr>
				<td><label for="descripcion">Descripción:</label></td>
				<td>
					<input type="text" th:field="*{descripcion}" id="descripcion">
					<span th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}" style="color: red;"></span>
				</td>
			</tr>

			<tr>
				<td><label for="existencia">Existencia:</label></td>
				<td>
					<input type="number" th:field="*{existencia}" id="existencia">
					<span th:if="${#fields.hasErrors('existencia')}" th:errors="*{existencia}" style="color: red;"></span>
				</td>
			</tr>

			<tr>
				<td><label for="precio_producto">Precio:</label></td>
				<td>
					<span>$</span>
					<input type="number" th:field="*{precio_producto}" id="precio_producto" step="0.01">
					<span th:if="${#fields.hasErrors('precio_producto')}" th:errors="*{precio_producto}" style="color: red;"></span>
				</td>
			</tr>

			<tr>
				<td></td>
				<td>
					<button type="submit">Guardar</button>
				</td>
			</tr>
		</table>
	</form>
</main>

</body>
</html>
