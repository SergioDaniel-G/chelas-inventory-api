<!DOCTYPE html >
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset='utf-8'>
<meta http-equiv='X-UA-Compatible' content='IE=edge'>
<title>prestado</title>
<!-- CSS only -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
	integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
	crossorigin="anonymous">
<meta name='viewport' content='width=device-width, initial-scale=1'>
<link rel='stylesheet' type='text/css' media='screen' href='main.css'>
<script src='main.js'></script>
</head>
<body>
	<nav class="navbar navbar-expand-md bg-secondary text-white">
		<a class="navbar-brand class= text-white" href="#">PRESTADO</a>
		<!-- Navbar links -->
		<div class="collapse navbar-collapse" id="collapsibleNavbar">
			<ul class="navbar-nav">
				<li class="nav-item"><a class="nav-link text-white"
					th:href="@{/prestados/nuevo}">Agregar prestado</a></li>
				<li class="nav-item"><a class="nav-link text-white"
					th:href="@{/index}">Regresar a menu</a></li>
			</ul>
		</div>
		<ul class="nav navbar-nav">
			<li sec:authorize="isAuthenticated()"><a
				class="nav-link text-white" th:href="@{/logout}">Cerrar sesion</a></li>
		</ul>
	</nav>
	<div class="container">
		<div class="alert alert-dark" th:if="${success !=null}"
			th:text="${success}"></div>
		<br>
		<div class="row6 text-dark">
			<h1>Personas que deben</h1>
			<style>
.row6 h1 {
	text-align: center;
}
</style>
		</div>
		<img src="img/deudoras.jpeg" width="60" height="80" alt="deudoras"
			class="img-fluid rounded float-right">
		<div class="row">
			<h4 class="card-title">
				<a th:href="@{/exportarPDFpr}"
					class="btn btn-danger btn-sm text-white">Exportar a PDF</a> <a
					th:href="@{/exportarExcelpr}"
					class="btn btn-danger btn-sm text-white">Exportar a Excel</a>
					<button onclick="ocultarDatos()"
					class="btn btn-danger btn-sm text-white">Ocultar datos</button>
				<button onclick="mostrarDatos()"
					class="btn btn-danger btn-sm text-white">Mostrar datos</button>
			</h4>
			&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
			<form class="form-inline" th:action="@{/prestados}">
				<div class="form-group">
					<label>Filtrar:</label>
				</div>
				&nbsp; &nbsp;
				<div class="form-group">
					<input type="text" name="keyword"
						placeholder="ingresa el dato a buscar" required>
				</div>
				&nbsp; &nbsp; <input type="submit"
					class="btn btn-info btn-sm text-white" value="Buscar">
				&nbsp; &nbsp; <input type="button"
					class="btn btn-info btn-sm text-white" value="Limpiar"
					onclick="limpiarCampos()">
			</form>
		</div>
		<br>
		<table id="tabla6" class="table table-hover" rules="all" border="1">
			<thead class="thead bg-secondary text-white">
				<tr>
					<th>Id</th>
					<th>Nombre</th>
					<th>Cantidad</th>
					<th>Total</th>
					<th>Descripcion del pedido</th>
					<th style="text-align: center">Acciones</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="prestado:${prestados}">
					<td style="height: 35px;" th:text="${prestado.id}">id</td>
					<td th:text="${prestado.nombre}">nombre</td>
					<td th:text="${prestado.cantidad}">cantidad</td>
					<td th:text="${prestado.total}">total</td>
					<td th:text="${prestado.descripcionDelPedido}">Descripcion del
						pedido</td>

					<td><a th:href="@{/verpr/{id}(id=${prestado.id})}"
						class="btn btn-ligth btn-sm text-dark">Detalles</a> <a
						th:href="@{/prestados/editar/{id}(id=${prestado.id})}"
						class="btn btn-ligth btn-sm text-dark">Actualizar</a> <a
						th:href="@{/prestados/{id}(id=${prestado.id})}"
						class="btn btn-ligth btn-sm text-dark">Eliminar</a></td>
				</tr>
				<tr>
				<td id=total class="navbar bg-danger text-white">Total</td>
				<td></td>
				<td></td>
				<td></td>
				
			</tr>
			</tbody>
		</table>
		<nav th:replace="paginator-nav :: paginator"></nav>
	</div>
	<footer th:replace="layout/layout :: footer"></footer>
	<script type="text/javascript">
		function limpiarCampos() {
			window.location = '/prestados';
		}
	</script>
	<script type="text/javascript">
     //sum of column 2-7
	for (var i = 4; i < 5; i++) {
		var sum = 0;
		// iteration through all td's in the column
		$('#tabla6>tbody>tr>td:nth-child(' + i + ')').each(function() {
			sum += parseInt($(this).text()) || 0;
		});
		// set total in last cell of the column
		$('#tabla6>tbody>tr>td:nth-child(' + i + ')').last().html(sum);
		$('#tabla6>tbody>tr>td:nth-child(' + i + ')').last().toggleClass(
				'total');
	}
</script>
<script type="text/javascript">
function ocultarDatos() {
	document.getElementById("tabla6").style.display = "none";
}
function mostrarDatos() {
	document.getElementById("tabla6").style.display = "";
}
	</script>
</body>
</html>
