<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  th:replace="~{layout/view :: layout(~{::section})}">
<body>

<section>
	<nav>
		<a th:href="@{/proveedores}" class="btn-back">Página anterior</a>
	</nav>
	<h2>Datos registrados</h2>
	<table>
		<tr>
			<th>ID:</th>
			<td th:text="${proveedor.id}"></td>
		</tr>
		<tr>
			<th>Nombre:</th>
			<td th:text="${proveedor.name}"></td>
		</tr>
		<tr>
			<th>Telefono:</th>
			<td th:text="${proveedor.phone}"></td>
		</tr>
		<tr>
			<th>Ubicacion:</th>
			<td th:text="${proveedor.location}"></td>
		</tr>
		<tr>
			<th>Fecha de Registro:</th>
			<td th:text="${proveedor.createdAt}"></td>
		</tr>
	</table>
</section>

</body>
</html>
