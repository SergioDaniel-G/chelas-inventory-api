<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<title>Inicio de sesión</title>
<!-- Latest compiled and minified CSS -->
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
	integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u"
	crossorigin="anonymous">

<!-- Optional theme -->
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap-theme.min.css"
	integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp"
	crossorigin="anonymous">
<link rel="stylesheet" href="css/estilo.css">
</head>
<body>
	<br>
	<br>
	<br>
	<div class="container">
		<div class="row">
			<div class="col-md-6 col-md-offset-3">
				<h1>Bienvenido a Micheladas Chelas</h1>
				<form th:action="@{/login}" method="post">

					<div th:if=${param.error}>
						<div class="alert alert-danger text-white">USUARIO O
							CONTRASEÑA INVALIDOS</div>
					</div>

					<div th:if=${param.logout}>
						<div class="alert alert-dark text-white">HAZ CERRADO SESION
							EXITOSAMENTE</div>
					</div>

					<div class="form-group">
						<label for="username">Correo de usuario : </label> <input
							id="username" name="username" type="text" class="form-controld"
							required autofocus="autofocus"
							placeholder="Digite su correo para identificarse">
					</div>

					<div class="form-group">
						<label for="password">Contraseña Usuario: </label> <input
							id="password" type="password" name="password"
							class="form-controld" required autofocus="autofocus"
							placeholder="Digite su contraseña para que puedas ingresar">
					</div>

					<div class="form-group">
						<div class="row">
							<div class="col-md-4 col-md-offset-3">
								<input type="submit" class="form-control btn btn-danger"
									name="login-submit" id="login-submit" value="Iniciar sesión" />
							</div>
						</div>
					</div>
				</form>
				<div class="form-group">
					<span>SI ERES NUEVO USUARIO<a th:href="@{/registro}">regístrate
							aqui</a></span>
				</div>
			</div>
		</div>
	</div>
	<div  class="text-center">
		<a href="/loadForgotPassword">olvidaste tu contraseña</a>
	</div>
	<br>
	<br>
	<br>
	<br>
	<div class="form-informacion">
		<font face="Garamond" size="5" style="color: #000000">Ing.Sergio
			Daniel Grajales Lopez</font>
	</div>
	<!-- Latest compiled and minified JavaScript -->
	<script
		src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"
		integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa"
		crossorigin="anonymous"></script>
</body>
</html>
