<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head th:replace="~{layout/layout :: head('Gestión de Caguamas')}"></head>
<body>
<nav th:replace="~{layout/layout :: navbar('Caguamas', '/caguamas/nuevo')}"></nav>
<div th:replace="~{layout/layout :: alerts}"></div>

<div class="container table-container">
    <h1>Caguamas</h1>
    <img th:src="@{/img/caguamas.jpg}" width="60" class="img-rounded float-right">

    <!-- Acciones y Formulario (puedes dejarlos aquí o fragmentarlos si son iguales) -->
    <div class="actions">
        <a th:href="@{/exportarPDF}" class="btn">PDF</a>
        <a th:href="@{/exportarExcel}" class="btn">Excel</a>
        <button onclick="ocultarDatos()" class="btn">Ocultar</button>
        <button onclick="mostrarDatos()" class="btn">Mostrar</button>
    </div>

    <div th:replace="~{layout/layout :: buscador('/caguamas')}"></div>

    <table id="table2">
        <thead>
        <tr><th>Id</th><th>Marca</th><th>Precio</th><th>Cantidad</th><th>Total</th><th>Fecha</th><th>Acciones</th></tr>
        </thead>
        <tbody>
        <tr th:each="caguama : ${caguamas}">
            <td th:text="${caguama.id}"></td>
            <td th:text="${caguama.marca}"></td>
            <td th:text="'$ ' + ${#numbers.formatDecimal(caguama.precio, 1, 2)}"></td>
            <td th:text="${caguama.cantidad}"></td>
            <td th:text="'$ ' + ${#numbers.formatDecimal(caguama.total, 1, 2)}"></td>
            <td th:text="${caguama.fechaRegistro}"></td>
            <td>
                <a th:href="@{/ver/{id}(id=${caguama.id})}" class="btn">Consultar</a>

                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/caguamas/editar/{id}(id=${caguama.id})}"
                   class="btn">Actualizar</a>

                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/caguamas/eliminar/{id}(id=${caguama.id})}"
                   class="btn btn-danger"
                   onclick="return confirm('¿Estás seguro de eliminar este registro?')">Eliminar</a>
            </td>
        </tr>
        </tbody>
        <tr id="granTotal">
            <td colspan="4" align="center">Total:</td>
            <td id="sumaTotal">$0</td>
            <td colspan="2"></td>
        </tr>
    </table>

    <div th:replace="~{layout/layout :: paginador(${page})}"></div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
