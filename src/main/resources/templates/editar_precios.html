<!DOCTYPE html >
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset='utf-8'>
<meta http-equiv='X-UA-Compatible' content='IE=edge'>
<title>editar precios</title>
<!-- CSS only -->
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous">
<meta name='viewport' content='width=device-width, initial-scale=1'>
</head>
<body>


	<nav class="navbar navbar-expand-md bg-dark navbar-dark">
		<a class="navbar-brand text-white" href="#">precios</a>
		<!-- Navbar links -->
		<div class="collapse navbar-collapse" id="collapsibleNavbar">
			<ul class="navbar-nav">
				<li class="nav-item"><a class="nav-link text-white"
					th:href="@{/precios}">lista precios</a></li>
				<li class="nav-item"><a class="nav-link text-white"
					th:href="@{/index}">menu micheladas</a></li>
			</ul>
		</div>
	</nav>

	<br>
	<div class="container">
		<div class="row">
			<div
				class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
				<div class="alert alert-success" th:if="${success !=null}"
					th:text="${success}"></div>
				<h1 class="text-center">Edición de precios</h1>
				<div class="card-body">

					<form th:action="@{/precios/{id}(id=${precio.id})}"
						th:object="${precio}" method="POST">

						<div class="form-group">
							<label>Id producto: </label> <input type="text"
								name="id_producto" th:field="*{id_producto}"
								class="form-control" placeholder="ingresa el id del producto : "
								required> <small class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('id_producto')}"
								th:errors="*{id_producto}"></small>
						</div>

						<div class="form-group">
							<label>Descripción : </label> <input type="text"
								name="descripcion" th:field="*{descripcion}"
								class="form-control"
								placeholder="ingresa la descripcion del producto : " required>
							<small class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('descripcion')}"
								th:errors="*{descripcion}"></small>
						</div>

						<div class="form-group">
							<label>Existencia : </label> <input type="text" name="existencia"
								th:field="*{existencia}" class="form-control"
								placeholder="ingresa la existencia : " required> <small
								class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('existencia')}"
								th:errors="*{existencia}"></small>
						</div>

						<div class="form-group">
							<label>Precio : </label> <input type="text" name="precio_producto"
								th:field="*{precio_producto}" class="form-control"
								placeholder="ingresa el precio : " required> <small
								class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('precio_producto')}" th:errors="*{precio_producto}"></small>
						</div>

						<div class="box-footer">
							<button class="btn btn-dark">Guardar</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
