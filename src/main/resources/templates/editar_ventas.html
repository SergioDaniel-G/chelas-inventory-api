<!DOCTYPE html >
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset='utf-8'>
<meta http-equiv='X-UA-Compatible' content='IE=edge'>
<title>editar ventas</title>
<!-- CSS only -->
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous">
<meta name='viewport' content='width=device-width, initial-scale=1'>
</head>
<body>


	<nav class="navbar navbar-expand-md bg-dark navbar-dark">
		<a class="navbar-brand text-white" href="#">ventas</a>
		<!-- Navbar links -->
		<div class="collapse navbar-collapse" id="collapsibleNavbar">
			<ul class="navbar-nav">
				<li class="nav-item"><a class="nav-link text-white"
					th:href="@{/ventas}">lista ventas</a></li>
				<li class="nav-item"><a class="nav-link text-white"
					th:href="@{/index}">menu principal</a></li>
			</ul>
		</div>
	</nav>

	<br>
	<div class="container">
		<div class="row">
			<div
				class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
				<div class="alert alert-success" th:if="${success !=null}"
					th:text="${success}"></div>
				<h1 class="text-center">Edición de ventas</h1>
				<div class="card-body">
					<form th:action="@{/ventas/{id}(id=${venta.id})}"
						th:object="${venta}" method="POST">

						<div class="form-group">
							<label>Vasos : </label> <input type="text" name="vasos"
								th:field="*{vasos}" class="form-control"
								placeholder="Digite los vasos : " required> <small
								class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('vasos')}" th:errors="*{vasos}"></small>
						</div>

						<div class="form-group">
							<label>Cigarros : </label> <input type="text" name="cigarros"
								th:field="*{cigarros}" class="form-control"
								placeholder="Digite las cigarros : " required> <small
								class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('cigarros')}" th:errors="*{cigarros}"></small>
						</div>

						<div class="form-group">
							<label>Caguamas : </label> <input type="text" name="caguamas"
								th:field="*{caguamas}" class="form-control"
								placeholder="Digite las caguamas : " required> <small
								class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('caguamas')}" th:errors="*{caguamas}"></small>
						</div>

						<div class="form-group">
							<label>Stock caguamas : </label> <input type="text"
								name="stock_caguamas" th:field="*{stock_caguamas}"
								class="form-control"
								placeholder="Digite el stock de las caguamas : " required>
							<small class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('stock_caguamas')}"
								th:errors="*{stock_caguamas}"></small>
						</div>

						<div class="form-group">
							<label>Stock_cigarros : </label> <input type="text"
								name="stock_cigarros" th:field="*{stock_cigarros}"
								class="form-control"
								placeholder="Digite el stock de los cigarros : " required>
							<small class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('stock_cigarros')}"
								th:errors="*{stock_cigarros}"></small>
						</div>

						<div class="form-group">
							<label>Total : </label> <input type="text" name="total"
								th:field="*{total}" class="form-control"
								placeholder="Digite el total : " required> <small
								class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('total')}" th:errors="*{total}"></small>
						</div>

						<div class="box-footer">
							<button class="btn btn-dark">Guardar</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
