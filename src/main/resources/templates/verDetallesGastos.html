<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/layout :: head">
<meta charset="utf-8">
</head>
<body>
	
	<div class="container py-4">
	   <div class="card bg-light">
	       <div class="card-header" text="detalles de los gastos">
	       </div>
	       <div class="card-body">
	          <ul class="list-group">
	             <li class="list-group-item active" th:text="${gasto.id}"></li>
	             <li class="list-group-item" th:text="${gasto.articulo}"></li>
	             <li class="list-group-item" th:text="${gasto.cantidad}"></li>
	             <li class="list-group-item" th:text="${gasto.precio}"></li>
	             <li class="list-group-item" th:text="${gasto.total}"></li>
	             <li class="list-group-item" th:text="${gasto.fechaRegistro}">
	             </li>
	             </ul>
	             <a th:href="@{/gastos}"
	             class="btn btn-primary text-white">regresar a gastos</a>
	       </div>
	   </div>
	</div>
	
</body>
</html>
