<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/layout :: head">
<meta charset="utf-8">
</head>
<body>

	<div class="container py-4">
		<div class="card bg-light">
			<div class="card-header" text="detalles de los prestados"></div>
			<div class="card-body">
				<ul class="list-group">
					<li class="list-group-item active" th:text="${prestado.id}"></li>
					<li class="list-group-item" th:text="${prestado.nombre}"></li>
					<li class="list-group-item" th:text="${prestado.cantidad}"></li>
					<li class="list-group-item" th:text="${prestado.total}"></li>
					<li class="list-group-item" th:text="${prestado.descripcionDelPedido}"></li>
				</ul>
				<a th:href="@{/prestados}" class="btn btn-primary text-white">regresar
					a prestado</a>
			</div>
		</div>
	</div>

</body>
</html>
