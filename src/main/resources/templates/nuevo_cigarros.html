<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<title>compras de cigarros</title>
<!-- CSS only -->
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
	integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
	crossorigin="anonymous">
</head>
<body>


	<nav class="navbar navbar-expand-md bg-secondary navbar-dark">
		<a class="navbar-brand text-white" href="#">CIGARROS</a>
		<!-- Navbar links -->
		<div class="collapse navbar-collapse" id="collapsibleNavbar">
			<ul class="navbar-nav">
				<li class="nav-item"><a class="nav-link text-white"
					th:href="@{/cigarros}">Lista de cigarros</a></li>
				<li class="nav-item"><a class="nav-link text-white"
					th:href="@{/index}">Menu micheladas</a></li>
			</ul>
		</div>
	</nav>

	<br>
	<div class="container">
		<div class="row">
			<div
				class="col-lg-5 col-md-6 col-sm-6 container justify-content-center card border-dark mb-3">
				<div class="alert alert-success" th:if="${success !=null}"
					th:text="${success}"></div>
				<h1 class="text-center">Cigarros</h1>
				<div class="card-body">
					<form th:action="@{/cigarros/guardar}" th:object="${cigarro}"
						method="POST">
						<div class="form-group">
							<label>Cantidad : </label> <input type="text" name="cantidad"
								th:field="*{cantidad}" class="form-control"
								placeholder="ingresa la cantidad de cajetillas compradas: "
								required> <small class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('cantidad')}" th:errors="*{cantidad}"></small>
						</div>

						<div class="form-group">
							<label>Precio : </label> <input type="text" name="precio"
								th:field="*{precio}" class="form-control"
								placeholder="ingresa el precio de la cajetilla: "
								required> <small class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></small>
						</div>

						<div class="form-group">
							<label>Marca : </label> <input type="text" name="marca"
								th:field="*{marca}" class="form-control"
								placeholder="ingresa la marca de la cajetilla: "
								required> <small class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('marca')}" th:errors="*{marca}"></small>
						</div>

						<div class="form-group">
							<label>Total : </label> <input type="text" name="total"
								th:field="*{total}" class="form-control"
								placeholder="ingresa el total pagado: " required>
							<small class="form-text text-danger offset-3"
								th:if="${#fields.hasErrors('total')}" th:errors="*{total}"></small>
						</div>

						<div class="box-footer">
							<button class="btn btn-danger">Guardar</button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
