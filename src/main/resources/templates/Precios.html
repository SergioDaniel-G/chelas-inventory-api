<!DOCTYPE html >
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/layout:: head">
<meta charset='utf-8'>
<meta http-equiv='X-UA-Compatible' content='IE=edge'>
<title>precios</title>
<!-- CSS only -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
	integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
	crossorigin="anonymous">
<meta name='viewport' content='width=device-width, initial-scale=1'>
<link rel='stylesheet' type='text/css' media='screen' href='main.css'>
<script src='main.js'></script>
</head>
<body>

	<nav class="navbar navbar-expand-md bg-secondary text-white">
		<a class="navbar-brand class= text-white" href="#">PRECIOS</a>
		<!-- Navbar links -->
		<div class="collapse navbar-collapse" id="collapsibleNavbar">
			<ul class="navbar-nav">
				<li class="nav-item"><a class="nav-link text-white"
					th:href="@{/precios/nuevo}">Agregar precios</a></li>
				<li class="nav-item"><a class="nav-link text-white"
					th:href="@{/index}">Menu micheladas</a></li>
			</ul>
		</div>
		<ul class="nav navbar-nav">
			<li sec:authorize="isAuthenticated()"><a
				class="nav-link text-white" th:href="@{/logout}">Cerrar sesion</a></li>
		</ul>
	</nav>
	<br>
	<div class="container">
		<div class="alert alert-dark" th:if="${success !=null}"
			th:text="${success}"></div>
		<div class="row5 text-dark">
			<h1>Precios</h1>
			<style>
.row5 h1 {
	text-align: center;
}
</style>
		</div>
		<img src="img/precios.png" width="80" height="80" alt="precios"
			class="img-fluid rounded float-right">
		<div class="row">
			<h4 class="card-title">
				<a th:href="@{/exportarPDFpre}"
					class="btn btn-danger btn-sm text-white">Exportar a PDF</a> <a
					th:href="@{/exportarExcelpre}"
					class="btn btn-danger btn-sm text-white">Exportar a Excel</a>
				<button onclick="ocultarDatos()"
					class="btn btn-danger btn-sm text-white">Ocultar datos</button>
				<button onclick="mostrarDatos()"
					class="btn btn-danger btn-sm text-white">Mostrar datos</button>
			</h4>
			&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
			<form class="form-inline" th:action="@{/precios}">
				<div class="form-group">
					<label>Filtrar:</label>
				</div>
				&nbsp; &nbsp;
				<div class="form-group">
					<input type="text" name="keyword"
						placeholder="ingresa el dato a buscar" required>
				</div>
				&nbsp; &nbsp; <input type="submit"
					class="btn btn-info btn-sm text-white" value="Buscar">
				&nbsp; &nbsp; <input type="button"
					class="btn btn-info btn-sm text-white" value="Limpiar"
					onclick="limpiarCampos()">
			</form>
		</div>
		<br>
		<table id="tabla5" class="table table-hover" rules="all" border="1">
			<thead class="thead bg-secondary text-white">
				<tr>
					<th>Id</th>
					<th>id_producto</th>
					<th>descripcion</th>
					<th>existencia</th>
					<th>precio</th>
					<th>Fecha de registro</th>
					<th style="text-align: center">Acciones</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="precio:${precios}">
					<td style="height: 35px;" th:text="${precio.id}">id</td>
					<td th:text="${precio.id_producto}">id_producto</td>
					<td th:text="${precio.descripcion}">descripcion</td>
					<td th:text="${precio.existencia}">existencia</td>
					<td th:text="${precio.precio_producto}">precio</td>
					<td th:text="${precio.fechaRegistro}">fecha de registro</td>

					<td><a th:href="@{/verpre/{id}(id=${precio.id})}"
						class="btn btn-ligth btn-sm text-dark">Detalles</a> <a
						th:href="@{/precios/editar/{id}(id=${precio.id})}"
						class="btn btn-ligth btn-sm text-dark">Actualizar</a> <a
						th:href="@{/precios/{id}(id=${precio.id})}"
						class="btn btn-ligth btn-sm text-dark">Eliminar</a></td>
				</tr>
			</tbody>
			<tr>
				<td id=total class="navbar bg-danger text-white">Total</td>
				<td></td>
				<td></td>
				<td></td>
				<td></td>
			</tr>
		</table>
		<nav th:replace="paginator-nav :: paginator"></nav>
	</div>

	<footer th:replace="layout/layout :: footer"></footer>
	<script type="text/javascript">
		//sum of column 2-7
		for (var i = 4; i < 6; i++) {
			var sum = 0;
			// iteration through all td's in the column
			$('#tabla5>tbody>tr>td:nth-child(' + i + ')').each(function() {
				sum += parseInt($(this).text()) || 0;
			});
			// set total in last cell of the column
			$('#tabla5>tbody>tr>td:nth-child(' + i + ')').last().html(sum);
			$('#tabla5>tbody>tr>td:nth-child(' + i + ')').last().toggleClass(
					'total');
		}
	</script>
	<script type="text/javascript">
		function limpiarCampos() {
			window.location = '/precios';
		}
	</script>
	<script type="text/javascript">
		function ocultarDatos() {
			document.getElementById("tabla5").style.display = "none";
		}
		function mostrarDatos() {
			document.getElementById("tabla5").style.display = "";
		}
	</script>
</body>
</html>
