<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | Portal Corporativo</title>
    <link rel="stylesheet" th:href="@{/css/vistas/access.css}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="user-img">
                <img th:src="@{/img/forgotpassword.png}" alt="Security Icon"/>
            </div>
            <h1>Recuperar Contraseña</h1>
            <p>Introduce tus datos para validar tu identidad</p>
        </div>

        <form th:action="@{/forgotPassword}" method="post" class="auth-form">

            <div th:if="${msg}" class="alert alert-error">
                <span th:text="${msg}"></span>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="mobileNum">Número Celular:</label>
                <input type="tel" id="mobileNum" name="mobileNum" maxlength="10" required>
            </div>

            <button type="submit" class="btn-primary">Enviar Solicitud</button>

            <div class="auth-footer">
                <a th:href="@{/login}" class="link-secondary">← Volver al inicio de sesión</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
