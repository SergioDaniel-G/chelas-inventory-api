<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Verificación de código</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="card text-center">
    <h3>Verificación de Seguridad</h3>
    <p class="text-muted">Hemos enviado un código a tu correo. Por favor, ingrésalo a continuación.</p>

    <div th:if="${error}" class="alert alert-danger" role="alert">
        Código inválido o expirado.
    </div>

    <form th:action="@{/auth/validar-otp}" method="post">
        <div class="mb-3">
            <input type="text" name="code" class="form-control form-control-lg text-center"
                   placeholder="2b2a0c" maxlength="6" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary w-100">Verificar Código</button>
    </form>

    <div class="mt-3">
        <a th:href="@{/login}" class="text-decoration-none">Volver al login</a>
    </div>
</div>

</body>
</html>
