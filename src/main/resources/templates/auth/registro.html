<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios | Micheladas Chelas</title>
    <link rel="stylesheet" th:href="@{/css/vistas/access.css}">
    <!-- OPTIMIZACIÓN: Solo carga el JS de Google si el captcha está habilitado -->
    <script th:if="${@environment.getProperty('RECAPTCHA_ENABLED') != 'false'}"
            src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="login-page">

<div class="login-card">
    <header class="login-header">
        <div class="logo-circle">MC</div>
        <h1>Crear <b>Cuenta</b></h1>
        <p>Gestión ERP Micheladas</p>
    </header>

    <div th:if="${param.exito}" class="alert alert-info">
        Registro completado con éxito.
    </div>

    <form th:action="@{/registro}" method="post" th:object="${usuario}" class="login-form">

        <div th:if="${@environment.getProperty('RECAPTCHA_ENABLED') != 'false'}"
             style="position: relative; margin-bottom: 20px;">

            <div id="captcha-overlay" style="position: absolute; width: 100%; height: 78px; z-index: 10; cursor: not-allowed;"></div>

            <div id="captcha-wrapper" style="opacity: 0.5; transition: 0.3s;">
                <div class="g-recaptcha" th:data-sitekey="${@environment.getProperty('google.recaptcha.site')}"></div>
            </div>

            <div id="captcha-hint" style="display: none; color: #d93025; font-size: 0.85em; margin-top: 8px; font-weight: bold; text-align: center; background: #ffeaea; padding: 8px; border-radius: 4px; border: 1px solid #f5c6cb;">
                Por favor, rellena primero el formulario.
            </div>
        </div>

        <!-- MENSAJE INFORMATIVO SI ESTÁ DESHABILITADO -->
        <div th:unless="${@environment.getProperty('RECAPTCHA_ENABLED') != 'false'}"
             style="margin-bottom: 20px; padding: 12px; background-color: #eef6ff; border: 1px dashed #2b7de9; border-radius: 6px; text-align: center;">
            <small style="color: #2b7de9; font-weight: 600;">
                🛠️ <b>Entorno de Evaluación:</b> Validación de seguridad omitida.
            </small>
        </div>

        <script th:if="${@environment.getProperty('RECAPTCHA_ENABLED') != 'false'}">
            document.addEventListener("DOMContentLoaded", function() {
    // 1. Capturamos todos los campos del formulario
    const campos = {
        nombre: document.getElementById('name'),
        apellido: document.getElementById('surname'),
        telefono: document.getElementById('mobileNumber'),
        email: document.getElementById('email'),
        pass: document.getElementById('password')
    };

    const wrapper = document.getElementById('captcha-wrapper');
    const overlay = document.getElementById('captcha-overlay');
    const hint = document.getElementById('captcha-hint');

    function verificarCampos() {
        // Verificamos que absolutamente todos los campos tengan contenido
        // trim() elimina los espacios en blanco
        const estaCompleto =
            campos.nombre.value.trim() !== "" &&
            campos.apellido.value.trim() !== "" &&
            campos.telefono.value.trim() !== "" &&
            campos.email.value.trim() !== "" &&
            campos.pass.value.trim() !== "";

        if (estaCompleto) {
            // Habilitamos el reCAPTCHA
            if (wrapper) wrapper.style.opacity = "1";
            if (overlay) overlay.style.display = "none";
            if (hint) hint.style.display = "none";
        } else {
            // Mantenemos el bloqueo
            if (wrapper) wrapper.style.opacity = "0.5";
            if (overlay) overlay.style.display = "block";
        }
    }


    Object.values(campos).forEach(input => {
        if (input) {
            input.addEventListener('input', verificarCampos);
        }
    });

    // 3. Advertencia si intentan clicar el captcha bloqueado
    if (overlay) {
        overlay.addEventListener('click', () => {
            hint.style.display = "block";
            hint.innerText = "Por favor, completa todos los campos del formulario para habilitar la verificación.";
        });
    }


    verificarCampos();
});
        </script>

        <div th:if="${error}" class="error-message"
             style="color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; padding: 10px; border-radius: 4px; margin-bottom: 20px; text-align: center;">
            <span th:text="${error}"></span>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="name">Nombre:</label>
                <input id="name" type="text" th:field="*{name}" maxlength="100">
                <small class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
            </div>
            <div class="form-group">
                <label for="surname">Apellido:</label>
                <input id="surname" type="text" th:field="*{surname}" maxlength="100">
                <small class="error-message" th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}"></small>
            </div>
        </div>

        <div class="form-group">
            <label for="mobileNumber">Teléfono:</label>
            <input id="mobileNumber" type="tel" th:field="*{mobileNumber}"
                   maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            <small class="error-message" th:if="${#fields.hasErrors('mobileNumber')}"
                   th:errors="*{mobileNumber}"></small>
        </div>

        <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input id="email" type="email" th:field="*{email}">
            <small class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
        </div>

        <div class="form-group">
            <label for="password">Contraseña:</label>

            <div class="password-wrapper">
                <input id="password" type="password" th:field="*{password}" minlength="8" maxlength="12">

                <button type="button" id="togglePassword" class="eye-btn">
                    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>

            <small class="error-message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
        </div>

        <button type="submit" class="btn-login">Registrar Usuario</button>

        <div class="form-footer">
            <p class="register-text">
                ¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión aquí</a>
            </p>
        </div>
    </form>
</div>

<footer class="footer-signature">
    <p>ERP desarrollado por: <b>Ing. Sergio Daniel Grajales Lopez</b></p>
</footer>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
