<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Reiniciar Contraseña | Portal Corporativo</title>
	<link rel="stylesheet" th:href="@{/css/vistas/acceso.css}">
</head>
<body class="bg-reset">

<div class="auth-container">
	<div class="auth-card">
		<div class="auth-header">
			<div class="user-img">
				<img th:src="@{/img/reset.png}" alt="Reset Icon"/>
			</div>
			<h1>Reiniciar Contraseña</h1>
			<p>Establece una nueva clave de acceso segura</p>
		</div>

		<form th:action="@{/changePassword}" method="post" class="auth-form">

			<div th:if="${msg}" class="alert alert-error">
				<span th:text="${msg}"></span>
			</div>

			<div class="form-group">
				<label for="psw">Nueva contraseña</label>
				<div class="password-wrapper">
					<input type="password" id="psw" name="psw" placeholder="Mínimo 8 caracteres" required minlength="8">
					<button type="button" class="eye-btn" title="Mostrar/Ocultar">
						<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
					</button>
				</div>
			</div>

			<div class="form-group">
				<label for="cpsw">Confirma contraseña</label>
				<div class="password-wrapper">
					<input type="password" id="cpsw" name="cpsw" placeholder="Repite tu contraseña" required>
					<button type="button" class="eye-btn" title="Mostrar/Ocultar">
						<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
					</button>
				</div>
			</div>

			<input type="hidden" name="id" th:value="${id}">

			<button type="submit" class="btn-primary">Actualizar Contraseña</button>

			<div class="auth-footer">
				<a th:href="@{/login}" class="link-secondary">← Cancelar y volver al login</a>
			</div>
		</form>
	</div>
</div>

<script th:src="@{/js/main.js}"></script>

</body>
</html>
