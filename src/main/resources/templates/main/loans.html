<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head th:replace="~{layout/layout :: head('Gestión de Prestados')}"></head>
<body>
<nav th:replace="~{layout/layout :: navbar('Prestados', '/prestados/nuevo')}"></nav>
<div th:replace="~{layout/layout :: alerts}"></div>

<div class="container table-container">
	<h1>Prestamos</h1>
	<img th:src="@{/img/loans.jpeg}" width="60" class="img-rounded float-right">

	<!-- Acciones y Formulario (puedes dejarlos aquí o fragmentarlos si son iguales) -->
	<div class="actions">
		<a th:href="@{/exportarPDFpr}" class="btn">PDF</a>
		<a th:href="@{/exportarExcelpr}" class="btn">Excel</a>
		<button onclick="ocultarDatos()" class="btn">Ocultar</button>
		<button onclick="mostrarDatos()" class="btn">Mostrar</button>
	</div>

	<div th:replace="~{layout/layout :: buscador('/ventas')}"></div>

	<table id="table2">
		<thead>
		<tr><th>Id</th><th>Nombre</th><th>Cantidad</th><th>Descripción</th><th>Total</th><th>Teléfono</th><th>Fecha</th><th>Acciones</th></tr>
		</thead>
		<tbody>
		<tr th:each="prestado : ${loans}">
			<td th:text="${prestado.id}"></td>
			<td th:text="${prestado.customerName}"></td>
			<td th:text="${prestado.quantity}"></td>
			<td th:text="${prestado.orderDescription}"></td>
			<td th:text="'$ ' + ${#numbers.formatDecimal(prestado.totalAmount, 1, 2)}"></td>
			<td th:text="${prestado.customerPhone}"></td>
			<td th:text="${prestado.createdAt}"></td>

			<td>
				<a th:href="@{/verpr/{id}(id=${prestado.id})}" class="btn">Consultar</a>
				<a th:href="@{/prestados/editar/{id}(id=${prestado.id})}" class="btn">Actualizar</a>
				<a sec:authorize="hasRole('ADMIN')" th:href="@{/prestados/eliminar/{id}(id=${prestado.id})}"
				   class="btn btn-danger"
				   onclick="return confirm('¿Estás seguro de eliminar este registro?')">Eliminar</a>
			</td>
		</tr>
		</tbody>
		<tr id="granTotal">
			<td colspan="4" align="right">Total:</td>
			<td id="sumaTotal">$0</td>
			<td colspan="4"></td>
		</tr>
	</table>

	<div th:replace="~{layout/layout :: paginador(${page})}"></div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
