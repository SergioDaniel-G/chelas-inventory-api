<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head th:replace="~{layout/layout :: head('Gestión de Ventas')}"></head>
<body>
<nav th:replace="~{layout/layout :: navbar('Ventas', '/ventas/nuevo')}"></nav>
<div th:replace="~{layout/layout :: alerts}"></div>

<div class="container table-container">
	<h1>Ventas</h1>
	<img th:src="@{/img/sales.jpg}" width="60" class="img-rounded float-right">

	<!-- Acciones y Formulario (puedes dejarlos aquí o fragmentarlos si son iguales) -->
	<div class="actions">
		<a th:href="@{/exportarPDFve}" class="btn">PDF</a>
		<a th:href="@{/exportarExcelven}" class="btn">Excel</a>
		<button onclick="ocultarDatos()" class="btn">Ocultar</button>
		<button onclick="mostrarDatos()" class="btn">Mostrar</button>
	</div>

	<div th:replace="~{layout/layout :: buscador('/ventas')}"></div>

	<table id="table2">
		<thead>
		<tr><th>Id</th><th>Vasos</th><th>Cigarros</th><th>Caguamas</th><th>Total</th><th>Stock_caguamas</th><th>Stock_cigarros</th><th>Fecha</th><th>Acciones</th></tr>
		</thead>
		<tbody>
		<tr th:each="venta : ${sales}">
			<td th:text="${venta.id}"></td>
			<td th:text="${venta.cupsQuantity}"></td>
			<td th:text="${venta.cigarettesQuantity}"></td>
			<td th:text="${venta.bigBottleQuantity}"></td>
			<td th:text="'$ ' + ${#numbers.formatDecimal(venta.totalAmount, 1, 2)}"></td>
			<td th:text="${venta.bigBottleStock}"></td>
			<td th:text="${venta.cigarettesStock}"></td>
			<td th:text="${venta.createdAt}"></td>
			<td>
				<a th:href="@{/verve/{id}(id=${venta.id})}" class="btn">Consultar</a>
				<a th:href="@{/ventas/editar/{id}(id=${venta.id})}" class="btn">Actualizar</a>
				<a sec:authorize="hasRole('ADMIN')" th:href="@{/ventas/{id}(id=${venta.id})}"
				   class="btn btn-danger"
				   onclick="return confirm('¿Estás seguro de eliminar este registro?')">Eliminar</a>
			</td>
		</tr>
		</tbody>
		<tr id="granTotal">
			<td colspan="4" align="right">Total:</td>
			<td id="sumaTotal">$0</td>
			<td colspan="4"></td>
		</tr>
	</table>

	<div th:replace="~{layout/layout :: paginador(${page})}"></div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
