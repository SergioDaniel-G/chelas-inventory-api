<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría de Accesos e IPs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/vistas/auditoria-ips.css}">
</head>

<body>

<div class="container-fluid px-4">

    <div class="table-container">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
                <h1>
                    <i class="bi bi-shield-check me-2"></i>
                    Auditoría de Accesos e IPs
                </h1>

                <p class="text-muted mb-0">
                    Monitoreo de accesos y seguridad del sistema
                </p>
            </div>

            <div>
                <a th:href="@{/IpsPdfExporter}" class="btn-pdf">
                    <i class="bi bi-file-earmark-pdf-fill me-1"></i>
                    Generar Reporte
                </a>
            </div>

        </div>

        <!-- TABLA -->
        <div class="table-responsive">

            <table class="table align-middle">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Usuario</th>
                    <th>IP</th>
                    <th>Dispositivo</th>
                    <th>Estado</th>
                    <th>Riesgo</th>
                    <th>Bot</th>
                    <th>User Agent</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="ip : ${userips}">

                    <td class="fw-bold" th:text="${ip.id}"></td>

                    <td th:text="${#temporals.format(ip.loginTime, 'dd/MM/yyyy HH:mm')}"></td>

                    <td th:text="${ip.email}"></td>

                    <td>
                        <code class="bg-light px-2 py-1 rounded"
                              th:text="${ip.ipAddress}">
                        </code>
                    </td>

                    <td class="text-center">
                        <i th:if="${ip.device == 'PC'}" class="bi bi-laptop"></i>
                        <i th:if="${ip.device != 'PC'}" class="bi bi-phone"></i>
                    </td>

                    <td>
                        <span class="fw-bold"
                              th:text="${ip.status}"
                              th:classappend="${ip.status == 'EXITOSO'}
                              ? 'text-success'
                              : 'text-danger'">
                        </span>
                    </td>

                    <td>
                        <span class="badge-risk"
                              th:text="${ip.riskLevel}"
                              th:classappend="${ip.riskLevel == 'HIGH'}
                              ? 'bg-high'
                              : (${ip.riskLevel == 'MEDIUM'}
                              ? 'bg-medium'
                              : 'bg-low')">
                        </span>
                    </td>

                    <td class="text-center">
                        <i th:if="${ip.isBot}" class="bi bi-robot text-danger"></i>
                        <span th:unless="${ip.isBot}" class="small-muted">No</span>
                    </td>

                    <td class="userAgent-cell"
                        th:text="${ip.userAgent}">
                    </td>

                </tr>

                <tr th:if="${#lists.isEmpty(userips)}">
                    <td colspan="9" class="text-center py-5">
                        No hay registros
                    </td>
                </tr>

                </tbody>

            </table>
            <div th:replace="~{layout/layout :: paginador(${page})}"></div>

        </div>

    </div>

</div>

<script th:src="@{/js/main.js}"></script>

</body>
</html>
