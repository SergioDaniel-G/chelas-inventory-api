<!DOCTYPE html >
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset='utf-8'>
<meta http-equiv='X-UA-Compatible' content='IE=edge'>
<title>proveedores</title>
<!-- CSS only -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
	integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
	crossorigin="anonymous">
<meta name='viewport' content='width=device-width, initial-scale=1'>
<link rel='stylesheet' type='text/css' media='screen' href='main.css'>
<script src='main.js'></script>
</head>
<body>
	<nav class="navbar navbar-expand-md bg-secondary text-white">
		<a class="navbar-brand class= text-white" href="#">PROVEEDORES</a>
		<!-- Navbar links -->
		<div class="collapse navbar-collapse" id="collapsibleNavbar">
			<ul class="navbar-nav">
				<li class="nav-item"><a class="nav-link text-white"
					th:href="@{/proveedores/nuevo}">Agregar proveedores</a></li>
				<li class="nav-item"><a class="nav-link text-white"
					th:href="@{/index}">Menu micheladas</a></li>
			</ul>
		</div>
		<ul class="nav navbar-nav">
			<li sec:authorize="isAuthenticated()"><a
				class="nav-link text-white" th:href="@{/logout}">Cerrar sesion</a></li>
		</ul>
	</nav>
	<div class="container">
		<div class="alert alert-dark" th:if="${success !=null}"
			th:text="${success}"></div>
		<br>
		<div class="row7 text-dark">
			<h1>Proveedores</h1>
			<style>
.row7 h1 {
	text-align: center;
}
</style>
		</div>
		<img src="img/proveedores.png" width="80" height="80"
			alt="proveedores" class="img-fluid rounded float-right">
		<div class="row">
			<h4 class="card-title">
				<a th:href="@{/exportarPDFpro}"
					class="btn btn-danger btn-sm text-white">exportar a PDF</a> <a
					th:href="@{/exportarExcelpro}"
					class="btn btn-danger btn-sm text-white">exportar a Excel</a>
				<button onclick="ocultarDatos()"
					class="btn btn-danger btn-sm text-white">Ocultar datos</button>
				<button onclick="mostrarDatos()"
					class="btn btn-danger btn-sm text-white">Mostrar datos</button>
			</h4>
			&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
			<form class="form-inline" th:action="@{/proveedores}">
				<div class="form-group">
					<label>Filtrar:</label>
				</div>
				&nbsp; &nbsp;
				<div class="form-group">
					<input type="text" name="keyword"
						placeholder="ingresa el dato a buscar" required>
				</div>
				&nbsp; &nbsp; <input type="submit"
					class="btn btn-info btn-sm text-white" value="Buscar">
				&nbsp; &nbsp; <input type="button"
					class="btn btn-info btn-sm text-white" value="Limpiar"
					onclick="limpiarCampos()">
			</form>
		</div>
		<br>
		<table id="tabla7" class="table table-hover" rules="all" border="1">
			<thead class="thead bg-secondary text-white">
				<tr>
					<th>Id</th>
					<th>Nombre</th>
					<th>Telefono</th>
					<th>Ubicacion</th>
					<th style="text-align: center">Acciones</th>
				</tr>
			</thead>
			<tbody id="proveedor">
				<tr th:each="proveedor:${proveedores}">
					<td style="height: 35px;" th:text="${proveedor.id}">id</td>
					<td th:text="${proveedor.nombre}">Nombre</td>
					<td th:text="${proveedor.telefono}">Telefono</td>
					<td th:text="${proveedor.ubicacion}">Ubicacion</td>

					<td><a th:href="@{/verpro/{id}(id=${proveedor.id})}"
						class="btn btn-ligth btn-sm text-dark">Detalles</a> <a
						th:href="@{/proveedores/editar/{id}(id=${proveedor.id})}"
						class="btn btn-ligth btn-sm text-dark">Actualizar</a> <a
						th:href="@{/proveedores/{id}(id=${proveedor.id})}"
						class="btn btn-ligth btn-sm text-dark">Eliminar</a></td>
				</tr>
			</tbody>
		</table>
		<nav th:replace="paginator-nav :: paginator"></nav>
	</div>
	<footer th:replace="layout/layout :: footer"></footer>
	
	<script type="text/javascript">
		function limpiarCampos() {
			window.location = '/proveedores';
		}
	</script>
	<script type="text/javascript">
		function ocultarDatos() {
			document.getElementById("tabla7").style.display = "none";
		}
		function mostrarDatos() {
			document.getElementById("tabla7").style.display = "";
		}
	</script>
</body>
</html>
