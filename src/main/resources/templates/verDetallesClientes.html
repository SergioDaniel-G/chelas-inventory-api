<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/layout :: head">
<meta charset="utf-8">
</head>
<body>

	<div class="container py-4">
		<div class="card">
			<div class="card-header"></div>
			<div class="card-body">
				<ul class="list-group">
					<li class="list-group-item active" th:text="${cliente.id}"></li>
					<li class="list-group-item" th:text="${cliente.num_cliente}"></li>
					<li class="list-group-item" th:text="${cliente.nombre_completo}"></li>
					<li class="list-group-item" th:text="${cliente.direccion}"></li>
					<li class="list-group-item" th:text="${cliente.cp}"></li>
				</ul>
				<a th:href="@{/clientes}" class="btn btn-primary text-white">regresar
					a clientes</a>
			</div>
		</div>
	</div>
</body>
</html>
