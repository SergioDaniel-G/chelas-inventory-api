<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head th:replace="~{layout/layout :: head('Gestión de Proveedores')}"></head>
<body>
<nav th:replace="~{layout/layout :: navbar('Proveedores', '/proveedores/nuevo')}"></nav>
<div th:replace="~{layout/layout :: alerts}"></div>

<div class="container table-container">
	<h1>Proveedores</h1>
	<img th:src="@{/img/suppliers.png}" width="60" class="img-rounded float-right">

	<!-- Acciones y Formulario (puedes dejarlos aquí o fragmentarlos si son iguales) -->
	<div class="actions">
		<a th:href="@{/exportarPDFpro}" class="btn">PDF</a>
		<a th:href="@{/exportarExcelpro}" class="btn">Excel</a>
		<button onclick="ocultarDatos()" class="btn">Ocultar</button>
		<button onclick="mostrarDatos()" class="btn">Mostrar</button>
	</div>

	<div th:replace="~{layout/layout :: buscador('/ventas')}"></div>

	<table id="table2">
		<thead>
		<tr><th>Id</th><th>Nombre</th><th>Teléfono</th><th>Ubicación</th><th>Fecha</th><th>Acciones</th></tr>
		</thead>
		<tbody>
		<tr th:each="proveedor : ${proveedores}">
			<td th:text="${proveedor.id}"></td>
			<td th:text="${proveedor.name}"></td>
			<td th:text="${proveedor.phone}"></td>
			<td th:text="${proveedor.location}"></td>
			<td th:text="${proveedor.createdAt}"></td>
			<td>
				<a th:href="@{/verpro/{id}(id=${proveedor.id})}" class="btn">Consultar</a>
				<a th:href="@{/proveedores/editar/{id}(id=${proveedor.id})}" class="btn">Actualizar</a>
				<a sec:authorize="hasRole('ADMIN')" th:href="@{/proveedores/{id}(id=${proveedor.id})}"
				   class="btn btn-danger"
				   onclick="return confirm('¿Estás seguro de eliminar este registro?')">Eliminar</a>
			</td>
		</tr>
		</tbody>
	</table>

	<div th:replace="~{layout/layout :: paginador(${page})}"></div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
