<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/layout :: head">
<meta charset="utf-8">
</head>
<body>

	<div class="container py-4">
		<div class="card bg-light">
			<div class="card-header"></div>
			<div class="card-body">
				<ul class="list-group">
					<li class="list-group-item active" th:text="${proveedor.id}"></li>
					<li class="list-group-item" th:text="${proveedor.nombre}"></li>
					<li class="list-group-item" th:text="${proveedor.telefono}"></li>
					<li class="list-group-item" th:text="${proveedor.ubicacion}"></li>
				</ul>
				<a th:href="@{/proveedores}" class="btn btn-primary text-white">regresar
					a proveedor</a>
			</div>
		</div>
	</div>

</body>
</html>
