<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/layout :: head">
<meta charset="utf-8">
</head>
<body>

	<div class="container py-4">
		<div class="card">
			<div class="card-header"></div>
			<div class="card-body">
				<ul class="list-group">
					<li class="list-group-item active" th:text="${caguama.id}"></li>
					<li class="list-group-item" th:text="${caguama.marca}"></li>
					<li class="list-group-item" th:text="${caguama.precio}"></li>
					<li class="list-group-item" th:text="${caguama.cantidad}"></li>
					<li class="list-group-item" th:text="${caguama.total}"></li>
					<li class="list-group-item" th:text="${caguama.fechaRegistro}">
					</li>
				</ul>
				<a th:href="@{/caguamas}" class="btn btn-primary text-white">regresar
					a caguamas</a>
			</div>
		</div>
	</div>
</body>
</html>
