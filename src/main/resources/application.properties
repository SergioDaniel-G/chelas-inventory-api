spring.profiles.active=local
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/micheladas?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
