spring.profiles.active=local

# DATABASE CONFIGURATION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

app.admin.email=${ADMIN_EMAIL:reclutador@ejemplo.com}
app.admin.password=${ADMIN_PASSWORD:password123}
app.admin.name=${ADMIN_NAME:Reclutador}
app.admin.surname=${ADMIN_SURNAME:Prueba}
app.admin.mobile=${ADMIN_MOBILE:1234567890}

# SESSION SECURITY
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.max-age=-1
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.secure=false

# JPA/HIBERNATE
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false

# THYMELEAF
spring.thymeleaf.cache=false
